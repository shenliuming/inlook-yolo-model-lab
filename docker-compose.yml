services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inlook-yolo-backend
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend/models:/app/backend/models
      - ./backend/uploads:/app/backend/uploads
      - ./backend/outputs:/app/backend/outputs
      - ./backend/reports:/app/backend/reports
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
