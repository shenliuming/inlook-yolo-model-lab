services:
  backend:
    build:
      context: .
      dockerfile: apps/yolo-api/Dockerfile
    container_name: inlook-yolo-backend
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./apps/yolo-api/models:/app/models
      - ./apps/yolo-api/uploads:/app/uploads
      - ./apps/yolo-api/outputs:/app/outputs
      - ./apps/yolo-api/reports:/app/reports
      - ./apps/yolo-api/runtime:/app/runtime
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
